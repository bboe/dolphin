plugins:
  - rubocop-rails

AllCops:
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'log/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'
  TargetRubyVersion: 3.4
  NewCops: disable

Layout/LineLength:
  Max: 120

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Metrics/MethodLength:
  Max: 16

# These metrics flag size/complexity, not defects. The current code reads
# clearly, so the thresholds are raised to fit it rather than extracting
# methods that would just scatter the logic.
Metrics/AbcSize:
  Max: 32

Metrics/ClassLength:
  Max: 110

Metrics/ParameterLists:
  Max: 6

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false
